name: Compile CV

on:
  push:
    branches: [main]
    paths:
      - 'asset/cv/**'
      - '.github/workflows/compile-cv.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live and tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended \
            texlive-lang-italian texlive-xetex texlive-bibtex-extra texlive-science \
            latexmk poppler-utils pandoc

      - name: Compile PDF from LaTeX
        working-directory: asset/cv
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error -jobname=cv main.tex

      - name: Convert PDF to HTML (optional)
        working-directory: asset/cv
        run: |
          if command -v pdftohtml >/dev/null 2>&1; then
            pdftohtml -s -i -q cv.pdf cv.html || true
          fi

      - name: Copy CV artifacts to root
        run: |
          cp asset/cv/cv.pdf cv.pdf
          if [ -f asset/cv/cv.html ]; then
            cp asset/cv/cv.html cv.html
          fi

      - name: Upload CV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-artifacts
          path: |
            asset/cv/cv.pdf
            asset/cv/cv.html
            index.html
